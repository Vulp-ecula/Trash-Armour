<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🪲 Trash Armour</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d0805; }
    @keyframes shake {
      0%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(5px)}
      60%{transform:translateX(-4px)}80%{transform:translateX(3px)}100%{transform:translateX(0)}
    }
    .shake { animation: shake 0.35s ease; }
    @media (prefers-reduced-motion: reduce) { .shake { animation: none; } }
  </style>
</head>
<body>
<div id="root"></div>
<script src="game.js"></script>
</body>
</html>
